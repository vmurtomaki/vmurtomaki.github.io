<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "My Portfolio" }}</title>
    <meta name="description" content="{{ page.description }}">
    
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        /* CSS Variables for easy color management */
        :root {
            --bg-color: #f8f9fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #0366d6;
            --card-bg: #ffffff;
            --border-color: #e9ecef;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* Typography */
        h1, h2, h3 {
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.75rem;
            margin-top: 2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        h3 {
            font-size: 1.25rem;
            margin-top: 1.5rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            text-decoration: underline;
            color: #004494;
        }

        /* Lists & Tables */
        ul {
            margin-bottom: 1rem;
            padding-left: 2rem;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        /* Blockquotes */
        blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1.5rem;
            font-style: italic;
            background-color: #f1f8ff;
            padding: 1rem;
            border-radius: 4px;
        }
        
        /* Ensures block equations have some breathing room */
        .MathJax_Display {
            margin: 1.5rem 0 !important;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* Footer */
        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <main>
            {{ content }}
        </main>

        <footer>
            <p>© 2026 Your Name. Built with Jekyll, Markdown, HTML & CSS.</p>
        </footer>
    </div>
</body>
</html>
